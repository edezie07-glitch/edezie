<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edezie Agaled | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8000;
            --secondary: #00f0ff;
            --bg-base: #02040a;
            --card-bg: rgba(10, 15, 30, 0.65);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* === SUBTLE MATRIX BACKGROUND === */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%; /* Only covers upper part */
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }

        /* Grid + Gradient Base */
        .bg-system {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #0a0f1a 0%, var(--bg-base) 70%);
            z-index: -2;
        }

        /* === FORMAL NAVIGATION === */
        nav {
            position: fixed;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            padding: 8px 12px;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-container { display: flex; gap: 6px; }

        .nav-btn {
            background: transparent;
            color: var(--text-dim);
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            transition: all 0.4s ease;
            border: none;
            cursor: pointer;
        }

        .nav-btn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .nav-btn.active {
            color: white;
            background: rgba(255, 128, 0, 0.15);
            border: 1px solid var(--primary);
        }

        /* === FORMAL BADGE === */
        .badge {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .badge:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Hero */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.8rem, 9vw, 6.5rem);
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typing-text {
            color: var(--secondary);
            font-size: 1rem;
            letter-spacing: 3px;
            font-weight: 500;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 45px;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .about-grid { display: grid; grid-template-columns: 1fr 420px; gap: 40px; }

        .profile-frame {
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .profile-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .profile-frame:hover img { transform: scale(1.05); }

        /* Responsive */
        @media (max-width: 900px) {
            .about-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Matrix Background -->
    <canvas class="matrix-bg" id="matrix"></canvas>
    <div class="bg-system"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <button class="nav-btn active" onclick="showSection('home', this)">Overview</button>
            <button class="nav-btn" onclick="showSection('education', this)">Education</button>
            <button class="nav-btn" onclick="showSection('achievements', this)">Awards</button>
        </div>
    </nav>

    <header>
        <div class="badge">AVAILABLE FOR OPPORTUNITIES</div>
        <h1>Edezie Agaled</h1>
        <div class="typing-text">SOFTWARE & NETWORKING ENGINEER</div>
    </header>

    <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px 100px;">
        
        <section id="home" class="section active">
            <div class="about-grid">
                <div class="glass-card">
                    <h2 style="font-size: 2.6rem; margin-bottom: 25px; font-family: 'Space Grotesk';">
                        Building the future <span style="color: var(--primary)">of the web.</span>
                    </h2>
                    <p style="color: var(--text-dim); font-size: 1.15rem; line-height: 1.7;">
                        I am a dedicated software engineer specializing in modern user interfaces and backend infrastructure. 
                        My approach combines technical precision with creative problem-solving.
                    </p>
                </div>
                <div class="profile-frame">
                    <img src="Screenshot 2025-11-19 211813/for html.jpg" alt="Edezie Agaled">
                </div>
            </div>
        </section>

        <!-- Other sections remain the same (you can keep your previous education & achievements sections) -->
    </div>

    <script>
        // === MATRIX DIGITAL RAIN ===
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight * 0.55;
        canvas.width = window.innerWidth;

        const chars = "01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 4, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff9d';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.55;
        });

        // Section switching
        function showSection(sectionId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
